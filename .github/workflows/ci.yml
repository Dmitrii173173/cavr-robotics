name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Core libraries, adapters, CLI apps and the test suite on all three desktop
  # platforms. Qt is intentionally absent here: the cavr-studio target detects a
  # missing Qt and skips itself, so this job stays fast and reliable.
  build-test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install CMake + Ninja
        uses: lukka/get-cmake@latest

      - name: Enable MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCAVR_BUILD_APPS=ON
          -DCAVR_BUILD_ADAPTERS=ON
          -DCAVR_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # Builds the Qt 6 / Quick3D desktop app (CAVR Studio) on all three platforms to
  # guarantee the GUI keeps compiling.
  build-studio:
    name: build studio (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Linux GUI build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev libxkbcommon-dev

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          modules: 'qtquick3d qtshadertools qtquicktimeline qt5compat'
          cache: true

      - name: Install CMake + Ninja
        uses: lukka/get-cmake@latest

      - name: Enable MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCAVR_BUILD_APPS=ON
          -DCAVR_BUILD_ADAPTERS=ON
          -DCAVR_BUILD_TESTS=OFF

      - name: Build CAVR Studio
        run: cmake --build build --target cavr-studio
