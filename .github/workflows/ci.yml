name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Core libraries, adapters, CLI apps and the test suite on all three desktop
  # platforms. Qt is intentionally absent here: the cavr-studio target detects a
  # missing Qt and skips itself, so this job stays fast and reliable.
  build-test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install CMake + Ninja
        uses: lukka/get-cmake@latest

      - name: Enable MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCAVR_BUILD_APPS=ON
          -DCAVR_BUILD_ADAPTERS=ON
          -DCAVR_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # Builds the Qt 6 / Quick3D desktop app (CAVR Studio) on all three platforms to
  # guarantee the GUI keeps compiling.
  build-studio:
    name: build studio (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Linux GUI build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev libxkbcommon-dev

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          modules: 'qtquick3d qtshadertools qtquicktimeline qt5compat'
          cache: true

      - name: Install CMake + Ninja
        uses: lukka/get-cmake@latest

      - name: Enable MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # Qt 6.8's prebuilt libs carry a stale link reference to the legacy AGL
      # framework, removed from the macOS 14+ SDK. Provide an empty stub so the
      # link succeeds (Qt does not actually call AGL); lets us use fast runners.
      - name: AGL stub (macOS)
        if: runner.os == 'macOS'
        run: |
          set -e
          FW="$RUNNER_TEMP/agl-stub"
          mkdir -p "$FW/AGL.framework/Versions/A"
          clang -dynamiclib -o "$FW/AGL.framework/Versions/A/AGL" -x c /dev/null \
            -install_name /System/Library/Frameworks/AGL.framework/Versions/A/AGL
          ln -sf Versions/A/AGL "$FW/AGL.framework/AGL"
          echo "CAVR_MAC_LDFLAGS=-F$FW" >> "$GITHUB_ENV"

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCAVR_BUILD_APPS=ON
          -DCAVR_BUILD_ADAPTERS=ON
          -DCAVR_BUILD_TESTS=OFF
          -DCMAKE_EXE_LINKER_FLAGS="${CAVR_MAC_LDFLAGS}"

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCAVR_BUILD_APPS=ON
          -DCAVR_BUILD_ADAPTERS=ON
          -DCAVR_BUILD_TESTS=OFF

      - name: Build CAVR Studio
        run: cmake --build build --target cavr-studio
